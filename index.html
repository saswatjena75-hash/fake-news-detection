<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📰 Fake News Detection System</h1>

    <form method="POST">
        <textarea name="news" placeholder="Paste news here..."></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result {{ label }}">
            <h2>{{ result }}</h2>
            <p>{{ confidence }}</p>
        </div>
    {% endif %}

    <div class="info">
        <h3>How it works</h3>
        <p>This system uses Machine Learning and NLP to classify news content.</p>
    </div>
</div>

</body>
</html>
